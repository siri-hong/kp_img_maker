<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Step Editor Pro - Ultimate Final Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { 
            --blue: #3182f6; --blue-light: #eff6ff; --gray-bg: #f8f9fa; 
            --line-color: #E5E8EB; --circle-bg: #EBEFF5; --circle-text: #7D8D9E; --border-color: #e2e8f0;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; height: 100vh; background: #ffffff; -webkit-font-smoothing: antialiased; }
        
        /* 사이드바 */
        .sidebar { width: 380px; background: var(--gray-bg); border-right: 1px solid #eee; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .sidebar h2 { font-size: 20px; font-weight: 800; margin: 0 0 20px 0; }
        .step-card { background: white; border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin-bottom: 15px; position: relative; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .step-num-label { font-size: 11px; font-weight: 800; color: var(--blue); }
        .btn-del { border: none; background: none; color: #cbd5e0; cursor: pointer; font-size: 18px; }
        textarea { width: 100%; border: 1px solid var(--border-color); border-radius: 6px; padding: 10px; font-size: 13px; resize: none; box-sizing: border-box; font-family: inherit; outline: none; overflow: hidden; min-height: 38px; color: #333; }
        .btn-sidebar-add { width: 100%; background-color: var(--blue-light); border: 1px dashed var(--blue); border-radius: 12px; color: var(--blue); font-size: 14px; font-weight: 600; padding: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 30px; }

        /* 프리뷰 영역 */
        .main-view { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 80px 50px; background: #f0f2f5; overflow-y: auto; }
        .preview-box { width: 327px; height: fit-content; box-shadow: 0 10px 40px rgba(0,0,0,0.08); background: white; }
        #capture-area { padding: 20px 24px; box-sizing: border-box; width: 327px; background: #ffffff; position: relative; }
        
        /* 단계 레이아웃 및 간격(24px) */
        .step-item { position: relative; display: flex; align-items: flex-start; gap: 16px; padding-bottom: 24px; }
        .step-item:last-child { padding-bottom: 0; }

        /* 가변 라인 로직 (상하 4px 간격 유지) */
        .step-item:not(:last-child)::after {
            content: ''; position: absolute; left: 22px; 
            top: 50px; bottom: 4px; 
            width: 2px; background-color: var(--line-color); z-index: 0;
        }

        /* 동그라미 스타일 */
        .circle { 
            width: 46px; height: 46px; background: var(--circle-bg); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 12px; color: var(--circle-text); font-weight: 500; flex-shrink: 0;
            line-height: 1.3; text-align: center; word-break: break-all; padding: 0 4px; box-sizing: border-box;
            position: relative; z-index: 1;
        }
        .circle span { display: inline-block; width: 36px; transform: translateY(-1px); }

        /* 텍스트 정렬 로직 (상단 첫 줄 고정) */
        .text-group { flex: 1; padding-top: 11px; display: flex; flex-direction: column; }
        .main-text { font-weight: 500; font-size: 16px; line-height: 1.5; color: #000; white-space: pre-wrap; letter-spacing: 0; }
        .sub-text { font-weight: 400; font-size: 14px; line-height: 1.4; color: #8B95A1; margin-top: 4px; white-space: pre-wrap; }

        .btn-save { width: 100%; background: #1a1f27; color: white; border: none; padding: 20px; cursor: pointer; border-radius: 12px; font-weight: 700; font-size: 15px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Step Editor</h2>
    <div id="input-list"></div>
    <button id="add-btn" class="btn-sidebar-add" onclick="addStep()">+ 단계 추가하기 (최대 10개)</button>
    <div class="control-panel" style="margin-top:auto;">
        <button class="btn-save" onclick="saveImage()">981px 투명 PNG 저장</button>
    </div>
</div>

<div class="main-view">
    <div class="preview-box">
        <div id="capture-area"><div id="preview-list"></div></div>
    </div>
</div>

<script>
    // ✨ 디폴트 텍스트 변경 완료
    let steps = [
        { c: "1단계", m: "메인카피를 입력하세요.", s: "서브카피를 입력하세요" },
        { c: "2단계", m: "메인카피를 입력하세요.", s: "서브카피를 입력하세요" },
        { c: "3단계", m: "메인카피를 입력하세요.", s: "서브카피를 입력하세요" }
    ];

    function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

    function render() {
        const inputDiv = document.getElementById('input-list');
        inputDiv.innerHTML = ''; 
        steps.forEach((step, i) => {
            const card = document.createElement('div');
            card.className = 'step-card';
            card.innerHTML = `
                <div class="card-header"><span class="step-num-label">STEP ${i+1}</span><button class="btn-del" onclick="removeStep(${i})">✕</button></div>
                <div class="input-group" style="display:flex; gap:10px;">
                    <textarea style="width:64px; text-align:center; font-weight:700;" maxlength="6" oninput="updateData(${i}, 'c', this)">${step.c}</textarea>
                    <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
                        <textarea oninput="updateData(${i}, 'm', this)">${step.m}</textarea>
                        <textarea style="font-size:12px; color:#999;" oninput="updateData(${i}, 's', this)">${step.s}</textarea>
                    </div>
                </div>`;
            inputDiv.appendChild(card);
            card.querySelectorAll('textarea').forEach(autoResize);
        });
        document.getElementById('add-btn').disabled = steps.length >= 10;
        renderPreview();
    }

    function updateData(i, k, el) { steps[i][k] = el.value; autoResize(el); renderPreview(); }

    function renderPreview() {
        const previewDiv = document.getElementById('preview-list');
        previewDiv.innerHTML = '';
        steps.forEach((step) => {
            const item = document.createElement('div');
            item.className = 'step-item';
            item.innerHTML = `
                <div class="circle"><span>${step.c}</span></div>
                <div class="text-group">
                    <div class="main-text">${step.m || ''}</div>
                    ${step.s ? `<div class="sub-text">${step.s}</div>` : ''}
                </div>
            `;
            previewDiv.appendChild(item);
        });
    }

    function addStep() {
        if(steps.length < 10) {
            steps.push({ c: (steps.length + 1) + "단계", m: "메인카피를 입력하세요.", s: "서브카피를 입력하세요" });
            render();
        }
    }
    function removeStep(i) { if (steps.length > 1) { steps.splice(i, 1); render(); } }

    async function saveImage() {
        const originalTarget = document.getElementById('capture-area');
        const clone = originalTarget.cloneNode(true);
        clone.style.position = 'fixed'; clone.style.top = '-9999px'; clone.style.padding = '0'; clone.style.background = 'transparent';
        document.body.appendChild(clone);
        try {
            const canvas = await html2canvas(clone, { scale: 3, backgroundColor: null, logging: false, useCORS: true, width: 327 });
            const link = document.createElement('a');
            link.download = `step_editor_complete_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png"); link.click();
        } finally { document.body.removeChild(clone); }
    }
    render();
</script>
</body>
</html>
