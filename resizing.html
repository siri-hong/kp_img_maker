<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer Pro v12.2 - Fixed Grid</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --bg: #f5f6f7; --panel: #ffffff; --blue: #3182f6; --text: #1a1f27; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 60px 20px; margin: 0; color: var(--text); -webkit-font-smoothing: antialiased; }
        .main-container { width: 100%; max-width: 1200px; display: flex; gap: 40px; justify-content: center; align-items: flex-start; }
        @media (max-width: 950px) { .main-container { flex-direction: column; align-items: center; } }
        .glass-panel { flex: 0 0 420px; width: 420px; background: var(--panel); padding: 32px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); box-sizing: border-box; display: flex; flex-direction: column; gap: 24px; position: sticky; top: 60px; }
        h1 { font-size: 22px; margin: 0; font-weight: 800; }
        .upload-section { width: 100%; }
        .file-label { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 52px; background: var(--blue); color: white; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; border:none; }
        .scale-section { display: flex; align-items: center; gap: 10px; width: 100%; }
        .input-box { flex: 1; display: flex; align-items: center; background: #f9fafb; padding: 0 14px; height: 52px; border-radius: 12px; border: 1px solid #eee; }
        .input-box span { font-size: 13px; color: #8b95a1; margin-right: 8px; font-weight: 800; }
        .input-box input { width: 100%; border: none; background: transparent; font-size: 15px; font-weight: 700; outline: none; }
        .lock-btn { background: #f9fafb; border: 1px solid #eee; width: 52px; height: 52px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; }
        .lock-btn.active { color: var(--blue); border-color: #d0e2ff; background: #f0f6ff; }
        .setting-row { border-top: 1px solid #f2f4f7; padding-top: 24px; }
        input[type="range"] { width: 100%; height: 6px; background: #e5e8eb; border-radius: 5px; appearance: none; outline: none; cursor: pointer; }
        #save-btn { width: 100%; padding: 18px; background: #1a1f27; color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        #save-btn:disabled { background: #e5e8eb; color: #adb5bd; }
        .preview-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 500px; }
        #preview-container {
            background: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.06); border: 1px solid #ddd; overflow: hidden;
            
            /* --- 고정 격자무늬 패턴 (네모네모) 설정 --- */
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee 100%), linear-gradient(45deg, #eee 25%, white 25%, white 75%, #eee 75%, #eee 100%);
            background-size: 20px 20px; /* 격자 크기를 20px로 고정 */
            background-position: 0 0, 10px 10px; /* 패턴 오프셋 고정 */
            
            cursor: move;
        }
        canvas { max-width: 100%; max-height: 100%; }
        .info-tag { font-size: 12px; color: #8b95a1; text-align: center; margin-top: 8px; line-height: 1.6; }
    </style>
</head>
<body>
<div class="main-container">
    <div class="glass-panel">
        <h1>Fixed Grid</h1>
        <div class="upload-section">
            <label for="imageInput" class="file-label" id="drop-zone">📂 이미지 불러오기</label>
            <input type="file" id="imageInput" accept="image/*" style="display:none">
        </div>
        <div class="scale-section">
            <div class="input-box"><span>W</span><input type="number" id="input-w" value="1000"></div>
            <button class="lock-btn active" id="lock-toggle">🔒</button>
            <div class="input-box"><span>H</span><input type="number" id="input-h" value="1000"></div>
        </div>
        <div class="setting-row">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:700; font-size:14px;">
                <span>이미지 확대/축소</span><span id="pad-val" style="color:var(--blue);">0</span>
            </div>
            <input type="range" id="pad-range" min="-1000" max="1000" step="5" value="0">
            <p class="info-tag">🔒 자물쇠가 닫혀있으면 입력 시 비율이 유지됩니다.<br>💡 캔버스 안에서 이미지를 드래그하여 이동하세요.</p>
        </div>
        <button id="save-btn" disabled>초고화질 PNG 내보내기</button>
    </div>
    <div class="preview-section"><div id="preview-container"><canvas id="mainCanvas"></canvas></div></div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('preview-container');
    const inputW = document.getElementById('input-w'), inputH = document.getElementById('input-h');
    const padRange = document.getElementById('pad-range'), saveBtn = document.getElementById('save-btn');
    const lockBtn = document.getElementById('lock-toggle');

    let loadedImg = null, isLocked = true, currentCanvasRatio = 1, imgContentRatio = 1;
    let offsetX = 0, offsetY = 0; 
    let isDragging = false, lastMouseX = 0, lastMouseY = 0;
    const GUIDE_RATIO = 70 / 981; 

    // --- 기본 기능 로직 ---
    lockBtn.onclick = () => {
        isLocked = !isLocked;
        lockBtn.classList.toggle('active');
        lockBtn.innerText = isLocked ? '🔒' : '🔓';
        if (isLocked) currentCanvasRatio = parseInt(inputW.value) / parseInt(inputH.value);
    };

    inputW.oninput = () => {
        if (isLocked) inputH.value = Math.round(inputW.value / currentCanvasRatio);
        drawCanvas();
    };

    inputH.oninput = () => {
        if (isLocked) inputW.value = Math.round(inputH.value * currentCanvasRatio);
        drawCanvas();
    };

    canvas.onmousedown = (e) => {
        if (!loadedImg) return;
        isDragging = true;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        lastMouseX = e.clientX * scaleX;
        lastMouseY = e.clientY * scaleY;
    };

    window.onmousemove = (e) => {
        if (!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const currX = e.clientX * scaleX;
        const currY = e.clientY * scaleY;
        offsetX += (currX - lastMouseX);
        offsetY += (currY - lastMouseY);
        lastMouseX = currX;
        lastMouseY = currY;
        drawCanvas();
    };

    window.onmouseup = () => { isDragging = false; };

    document.getElementById('imageInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                loadedImg = img;
                imgContentRatio = img.width / img.height;
                inputW.value = 1000;
                inputH.value = 1000;
                currentCanvasRatio = 1; 
                offsetX = 0; offsetY = 0;
                saveBtn.disabled = false;
                drawCanvas();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    function renderCore(targetCtx, w, h, userPadding, isPreview) {
        targetCtx.clearRect(0, 0, w, h); 
        if (loadedImg) {
            const availW = w - (userPadding * 2);
            const availH = h - (userPadding * 2);
            let tW, tH;
            if (imgContentRatio > availW / availH) { tW = availW; tH = availW / imgContentRatio; }
            else { tH = availH; tW = availH * imgContentRatio; }

            const tx = (w - tW) / 2 + offsetX;
            const ty = (h - tH) / 2 + offsetY;

            const off = document.createElement('canvas');
            off.width = Math.max(1, tW); off.height = Math.max(1, tH);
            const octx = off.getContext('2d');
            octx.imageSmoothingEnabled = true; octx.imageSmoothingQuality = 'high';
            octx.drawImage(loadedImg, 0, 0, tW, tH);
            targetCtx.drawImage(off, tx, ty);
            
            targetCtx.save();
            targetCtx.globalCompositeOperation = 'multiply'; targetCtx.globalAlpha = 0.12;
            targetCtx.drawImage(off, tx, ty);
            targetCtx.globalCompositeOperation = 'overlay'; targetCtx.globalAlpha = 0.08;
            targetCtx.drawImage(off, tx, ty);
            targetCtx.restore();
        }

        if (isPreview) {
            targetCtx.save();
            const p = w * GUIDE_RATIO; 
            targetCtx.fillStyle = "rgba(255, 0, 0, 0.25)"; 
            targetCtx.beginPath();
            targetCtx.rect(0, 0, w, h);
            targetCtx.rect(p, h - p, w - (p * 2), -(h - (p * 2)));
            targetCtx.fill();
            targetCtx.strokeStyle = "rgba(49, 130, 246, 0.5)";
            targetCtx.lineWidth = 1.5;
            targetCtx.strokeRect(p, p, w - (p * 2), h - (p * 2));
            targetCtx.restore();
        }
    }

    function drawCanvas() {
        const w = parseInt(inputW.value) || 1, h = parseInt(inputH.value) || 1;
        const userPadding = parseInt(padRange.value);
        const maxDisplay = 650;
        let dW = w, dH = h;
        if (w > maxDisplay || h > maxDisplay) {
            const scale = Math.min(maxDisplay / w, maxDisplay / h);
            dW = w * scale; dH = h * scale;
        }
        container.style.width = dW + 'px';
        container.style.height = dH + 'px';
        canvas.width = w; canvas.height = h;
        renderCore(ctx, w, h, userPadding, true);
    }

    padRange.oninput = () => { document.getElementById('pad-val').innerText = padRange.value; drawCanvas(); };
    saveBtn.onclick = () => {
        const saveCanvas = document.createElement('canvas');
        const sctx = saveCanvas.getContext('2d');
        const w = parseInt(inputW.value), h = parseInt(inputH.value);
        saveCanvas.width = w; saveCanvas.height = h;
        renderCore(sctx, w, h, parseInt(padRange.value), false);
        const link = document.createElement('a');
        link.download = `Result_${w}x${h}.png`;
        link.href = saveCanvas.toDataURL('image/png', 1.0);
        link.click();
    };

    drawCanvas();
</script>
</body>
</html>
